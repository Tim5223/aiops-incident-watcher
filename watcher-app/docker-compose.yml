services:
  db:
    image: postgres:16-alpine
    container_name: watcher-db
    environment:
      POSTGRES_USER: watcher
      POSTGRES_PASSWORD: watcherpass
      POSTGRES_DB: watcherdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watcher -d watcherdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  watcher:
    build: .
    container_name: watcher-app
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    environment:
      DATABASE_URL: postgresql://watcher:watcherpass@db:5432/watcherdb
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
