name: Build and Deploy Watcher App

# Only runs when something inside watcher-app/ actually changes,
# and only on pushes to main (not every branch/PR).
on:
  push:
    branches: [main]
    paths:
      - "watcher-app/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./watcher-app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/aiops-watcher:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/aiops-watcher:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Deploy latest image
        run: |
          kubectl rollout restart deployment/watcher-app
          kubectl rollout status deployment/watcher-app --timeout=120s
