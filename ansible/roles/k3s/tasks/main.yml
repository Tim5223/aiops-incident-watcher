- name: Download and install k3s (Traefik disabled)
  become: yes
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
  args:
    creates: /usr/local/bin/k3s

- name: Wait for k3s kubeconfig to exist
  become: yes
  ansible.builtin.wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    timeout: 60

- name: Set readable permissions on kubeconfig
  become: yes
  file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: '0644'

- name: Ensure ubuntu user's .kube directory exists
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Copy kubeconfig to ubuntu home
  become: yes
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/ubuntu/.kube/config
    remote_src: yes
    owner: ubuntu
    group: ubuntu
    mode: '0600'
