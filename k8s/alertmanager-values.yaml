alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "watcher-webhook"
      group_by: ["alertname"]
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 1h
      routes:
        # Watchdog fires permanently by design (proves Alertmanager itself
        # is alive) -- silence it so it doesn't flood the webhook.
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: "null"
      - name: "watcher-webhook"
        webhook_configs:
          - url: "http://watcher-app.default.svc.cluster.local:8000/webhook/alertmanager"
            send_resolved: false
