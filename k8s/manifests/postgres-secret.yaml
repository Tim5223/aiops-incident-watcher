# Base64-encode your actual values before using this in production, e.g.:
#   echo -n 'watcherpass' | base64
# For now this uses stringData, which lets you write plain text directly
# (Kubernetes encodes it automatically) -- simpler for a portfolio project.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: watcher
  POSTGRES_PASSWORD: watcherpass
  POSTGRES_DB: watcherdb
