# This is the "least-privilege" principle in action: the Watcher app can
# ONLY list, get, and delete pods -- it cannot touch Secrets, Deployments,
# Services, or anything else in the cluster. Worth mentioning explicitly
# in interviews as a deliberate security decision.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: watcher-service-account

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: watcher-pod-manager
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: watcher-pod-manager-binding
subjects:
  - kind: ServiceAccount
    name: watcher-service-account
roleRef:
  kind: Role
  name: watcher-pod-manager
  apiGroup: rbac.authorization.k8s.io
