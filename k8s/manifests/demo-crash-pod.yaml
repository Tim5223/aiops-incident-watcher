# A deliberately broken pod: it starts, sleeps 5 seconds, then exits with an
# error code -- causing Kubernetes to restart it repeatedly (a real crash-loop).
# Useful for demoing the full pipeline: Prometheus detects it -> Alertmanager
# fires -> Watcher app receives webhook -> Gemini diagnoses -> policy decides.
#
# To clean up afterward: kubectl delete -f demo-crash-pod.yaml
apiVersion: v1
kind: Pod
metadata:
  name: demo-crash-pod
  labels:
    app: demo-crash-pod
spec:
  restartPolicy: Always
  containers:
    - name: crasher
      image: busybox
      command: ["sh", "-c", "echo 'Starting up...'; sleep 5; echo 'Simulating a crash!'; exit 1"]
